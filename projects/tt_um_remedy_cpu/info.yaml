# Tiny Tapeout project information
project:
  title:        "FFD16 cpu 16-bit"      # Project title
  author:       "Bahri Berkant İçöz"      # Your name
  discord:      "aerkany"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "16-bit spi cpu"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     25000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "2x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_remedy_cpu"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_remedy_cpu.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "cpu input pin [0]"
  ui[1]: "cpu input pin [1]"
  ui[2]: "cpu input pin [2]"
  ui[3]: "cpu input pin [3]"
  ui[4]: "cpu input pin [4]"
  ui[5]: "cpu input pin [5]"
  ui[6]: "cpu input pin [6]"
  ui[7]: "cpu input pin [7]"

  # Outputs
  uo[0]: "cpu output pin [0]"
  uo[1]: "cpu output pin [1]"
  uo[2]: "cpu output pin [2]"
  uo[3]: "cpu output pin [3]"
  uo[4]: "cpu output pin [4]"
  uo[5]: "cpu output pin [5]"
  uo[6]: "cpu output pin [6]"
  uo[7]: "cpu output pin [7]"

  # Bidirectional pins
  uio[0]: "spi_miso"
  uio[1]: "spi_ram_cs"
  uio[2]: "spi_flash_cs"
  uio[3]: "spi_mosi"
  uio[4]: "spi_sclk"
  uio[5]: "I2c_sda"
  uio[6]: "I2c_scl"
  uio[7]: "not used"

# Do not change!
yaml_version: 6
