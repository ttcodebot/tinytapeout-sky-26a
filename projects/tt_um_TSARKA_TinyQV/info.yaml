# Tiny Tapeout project information
project:
  title:        "TinyQV Wishbone SoC"      # Project title
  author:       "TSARKA"      # Your name
  discord:      "pa1mas"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "TinyQV RISC-V SoC with Wishbone UART16550/GPIO and exposed debug signals"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     40000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  # This TinyQV SoC is much larger than a single-tile wrapper and needs a
  # multi-tile footprint for OpenROAD placement/routing to converge.
  tiles: "6x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_TSARKA_TinyQV"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "TinyQV/tinyqv.v"
    - "TinyQV/alu.v"
    - "TinyQV/core.v"
    - "TinyQV/counter.v"
    - "TinyQV/cpu.v"
    - "TinyQV/decode.v"
    - "TinyQV/latch_reg.v"
    - "TinyQV/mem_ctrl.v"
    - "TinyQV/qspi_ctrl.v"
    - "TinyQV/register.v"
    - "TinyQV/time.v"
    - "TinyQV/wb_bridge.v"
    - "Peripherals/GPIO/adapter_wb.v"
    - "Peripherals/GPIO/EF_GPIO8_WB.v"
    - "Peripherals/GPIO/EF_GPIO8.v"
    - "Peripherals/GPIO/ef_util_stubs.v"
    - "Peripherals/UART16550/raminfr.v"
    - "Peripherals/UART16550/timescale.v"
    - "Peripherals/UART16550/uart_debug_if.v"
    - "Peripherals/UART16550/uart_defines.v"
    - "Peripherals/UART16550/uart_receiver.v"
    - "Peripherals/UART16550/uart_regs.v"
    - "Peripherals/UART16550/uart_rfifo.v"
    - "Peripherals/UART16550/uart_sync_flops.v"
    - "Peripherals/UART16550/uart_tfifo.v"
    - "Peripherals/UART16550/uart_top.v"
    - "Peripherals/UART16550/uart_transmitter.v"
    - "Peripherals/UART16550/uart_wb.v"
    - "Peripherals/UART16550/wb_uart16550_adapter.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "GPIO IN[0] / ext IRQ0 / uo mode select (0=GPIO, 1=debug)"
  ui[1]: "GPIO IN[1] / ext IRQ1 / debug probe select bit 0"
  ui[2]: "GPIO IN[2] / debug probe select bit 1"
  ui[3]: "GPIO IN[3] / debug probe select bit 2"
  ui[4]: "GPIO IN[4] / debug probe select bit 3"
  ui[5]: "GPIO IN[5]"
  ui[6]: "GPIO IN[6]"
  ui[7]: "GPIO IN[7] / UART RX"

  # Outputs
  uo[0]: "UART TX (always)"
  uo[1]: "GPIO OUT[1] / selected debug probe in debug mode"
  uo[2]: "GPIO OUT[2] / DEBUG instr_complete"
  uo[3]: "GPIO OUT[3] / DEBUG instr_ready"
  uo[4]: "GPIO OUT[4] / DEBUG branch"
  uo[5]: "GPIO OUT[5] / DEBUG fetch_restart"
  uo[6]: "GPIO OUT[6] / DEBUG data_ready"
  uo[7]: "GPIO OUT[7] / DEBUG interrupt_pending"

  # Bidirectional pins
  uio[0]: "QSPI Flash CS"
  uio[1]: "QSPI SD0"
  uio[2]: "QSPI SD1"
  uio[3]: "QSPI SCK"
  uio[4]: "QSPI SD2"
  uio[5]: "QSPI SD3"
  uio[6]: "QSPI RAM A CS"
  uio[7]: "QSPI RAM B CS"

# Do not change!
yaml_version: 6
