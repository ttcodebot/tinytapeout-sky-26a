# Tiny Tapeout project information
project:
  title:        "WobblyBits"
  author:       "Isaac W"
  discord:      "iawev3"
  description:  "A probabilistic computing array: 6 p-bits driven by a ring-oscillator TRNG, with a SPI-loaded 6×6 coupling matrix for Ising/Boltzmann sampling on SKY130."
  language:     "Verilog"
  clock_hz:     25000000

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_Rats2012_WobblyBits"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "neoTRNG.v"
    - "pbit_array.v"
    - "spi_j_slave.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "run"           # 1 = run network, 0 = pause
  ui[1]: "rand_init"     # seed TRNG / randomise initial p-bit states
  ui[2]: "trng_bypass"   # freeze TRNG output (for deterministic testing)
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "pbit0"         # live p-bit state
  uo[1]: "pbit1"
  uo[2]: "pbit2"
  uo[3]: "pbit3"
  uo[4]: "pbit4"
  uo[5]: "pbit5"
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: "SPI_CS"       # SPI chip select (active low)
  uio[1]: "SPI_MOSI"     # SPI data in (J matrix weights)
  uio[2]: "SPI_MISO"     # SPI data out
  uio[3]: "SPI_SCK"      # SPI clock
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
