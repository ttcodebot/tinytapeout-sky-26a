<svg width="680" height="620" viewBox="0 0 680 620" role="img" style="background:#fff;font-family:monospace;" xmlns="http://www.w3.org/2000/svg">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">P-bit hardware architecture flowchart</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">Flowchart showing data flow from SPI input through J coupling matrix and neoTRNG to p-bit array with feedback loop, outputting to uo_out</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-dash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- SPI Input -->
  <rect x="240" y="30" width="200" height="52" rx="0" fill="#fff" stroke="#000" stroke-width="1" style="fill:rgb(255, 255, 255);stroke:rgb(0, 0, 0);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="340" y="52" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#000" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:700;text-anchor:middle;dominant-baseline:auto">SPI interface</text>
  <text x="340" y="70" text-anchor="middle" font-family="monospace" font-size="11" fill="#000" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">uio[0..3]</text>

  <!-- Arrow SPI → J matrix -->
  <line x1="340" y1="82" x2="340" y2="136" stroke="#000" stroke-width="1" marker-end="url(#arrow)" style="fill:rgb(0, 0, 0);stroke:rgb(0, 0, 0);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- J Coupling Matrix -->
  <rect x="200" y="138" width="280" height="56" rx="0" fill="#fff" stroke="#000" stroke-width="1" style="fill:rgb(255, 255, 255);stroke:rgb(0, 0, 0);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="340" y="160" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#000" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:700;text-anchor:middle;dominant-baseline:auto">J coupling matrix</text>
  <text x="340" y="178" text-anchor="middle" font-family="monospace" font-size="11" fill="#000" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">15 x 8-bit signed registers</text>

  <!-- Arrow J matrix → neoTRNG -->
  <line x1="340" y1="194" x2="340" y2="256" stroke="#000" stroke-width="1" marker-end="url(#arrow)" style="fill:rgb(0, 0, 0);stroke:rgb(0, 0, 0);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- neoTRNG -->
  <rect x="200" y="258" width="280" height="56" rx="0" fill="#fff" stroke="#000" stroke-width="1" style="fill:rgb(255, 255, 255);stroke:rgb(0, 0, 0);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="340" y="280" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#000" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:700;text-anchor:middle;dominant-baseline:auto">neoTRNG</text>
  <text x="340" y="298" text-anchor="middle" font-family="monospace" font-size="11" fill="#000" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">3 ring-oscillator cells</text>

  <!-- Arrow neoTRNG → P-bit array -->
  <line x1="340" y1="314" x2="340" y2="376" stroke="#000" stroke-width="1" marker-end="url(#arrow)" style="fill:rgb(0, 0, 0);stroke:rgb(0, 0, 0);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- P-bit array -->
  <rect x="190" y="378" width="300" height="56" rx="0" fill="#fff" stroke="#000" stroke-width="1" style="fill:rgb(255, 255, 255);stroke:rgb(0, 0, 0);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="340" y="400" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#000" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:700;text-anchor:middle;dominant-baseline:auto">P-bit array [0..5]</text>
  <text x="340" y="418" text-anchor="middle" font-family="monospace" font-size="11" fill="#000" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Gibbs sampling update</text>

  <!-- Feedback loop: right side from p-bit array back up to J matrix -->
  <path d="M490 406 L558 406 L558 166 L482 166" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow-dash)" style="fill:none;stroke:rgb(0, 0, 0);color:rgb(0, 0, 0);stroke-width:1px;stroke-dasharray:5px, 3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="570" y="290" text-anchor="start" font-family="monospace" font-size="11" fill="#000" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">feedback</text>
  <text x="570" y="306" text-anchor="start" font-family="monospace" font-size="11" fill="#000" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">p-bit states</text>

  <!-- Arrow P-bit → output -->
  <line x1="340" y1="434" x2="340" y2="500" stroke="#000" stroke-width="1" marker-end="url(#arrow)" style="fill:rgb(0, 0, 0);stroke:rgb(0, 0, 0);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Output -->
  <rect x="210" y="502" width="260" height="56" rx="0" fill="#fff" stroke="#000" stroke-width="1" style="fill:rgb(255, 255, 255);stroke:rgb(0, 0, 0);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="340" y="524" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#000" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:700;text-anchor:middle;dominant-baseline:auto">uo_out[5:0]</text>
  <text x="340" y="542" text-anchor="middle" font-family="monospace" font-size="11" fill="#000" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Live p-bit states</text>

</svg>
