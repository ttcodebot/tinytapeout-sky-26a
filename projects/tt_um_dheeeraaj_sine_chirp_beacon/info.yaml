# Tiny Tapeout project information
project:
  title:        "DDS Sine Chirp Beacon"      # Project title
  author:       "Dheeraj Sharma"      # Your name
  discord:      "chandra"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Fixed-tone / chirp / dual-tone DDS sine source with 8-bit sample and 1-bit PDM outputs"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     1000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_dheeeraaj_sine_chirp_beacon"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "PITCH0"
  ui[1]: "PITCH1"
  ui[2]: "PITCH2"
  ui[3]: "PITCH3"
  ui[4]: "PITCH4"
  ui[5]: "ENABLE"
  ui[6]: "MODE0"
  ui[7]: "MODE1"

  # Outputs
  uo[0]: "SINE_DAC0"
  uo[1]: "SINE_DAC1"
  uo[2]: "SINE_DAC2"
  uo[3]: "SINE_DAC3"
  uo[4]: "SINE_DAC4"
  uo[5]: "SINE_DAC5"
  uo[6]: "SINE_DAC6"
  uo[7]: "SINE_DAC7"

  # Bidirectional pins
  uio[0]: "PDM_OUT"
  uio[1]: "SQUARE_REF"
  uio[2]: "CHIRP_SYNC"
  uio[3]: "ENABLE_MON"
  uio[4]: "DEPTH0 / INTERVAL0"
  uio[5]: "DEPTH1 / INTERVAL1"
  uio[6]: "RATE0"
  uio[7]: "RATE1"

# Do not change!
yaml_version: 6
