# Tiny Tapeout project information
project:
  title:        "4x4 Systolic Matrix MAC Accelerator"
  author:       "Josh Taylor"
  discord:      "Coizi"      # add your discord username if you have one
  description:  "4x4 systolic array matrix multiply accelerator with SPI interface"
  language:     "SystemVerilog"
  clock_hz:     50000000       # 50 MHz
  tiles: "2x2"
  top_module:  "tt_um_systolic_top"
  
  source_files:
    - "primitives.v"
    - "pe.v"
    - "systolic_array.v"
    - "control_fsm.v"
    - "spi_slave.v"
    - "spi_tx.v"
    - "tt_um_systolic_top.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "SCK"
  ui[1]: "MOSI"
  ui[2]: "CS"
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""
  # Outputs
  uo[0]: "MISO"
  uo[1]: "comp_done"
  uo[2]: "load_done"
  uo[3]: "spi_done"
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""
  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""
# Do not change!
yaml_version: 6