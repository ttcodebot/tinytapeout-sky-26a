# Tiny Tapeout project information
project:
  title:        "Digital STDP Learning Controller"
  author:       "Prof. Santhosh Sivasubramani, IIT Delhi"
  discord:      ""
  description:  "Standalone spike-timing-dependent plasticity engine with programmable LUT, configurable learning rate, R-STDP reward-gated updates, anti-Hebbian mode, eligibility trace with leaky counter, and SPI interface"
  language:     "Verilog"
  clock_hz:     50000000

  tiles: "1x1"

  top_module:  "tt_um_santhosh_stdp_ctrl"

  source_files:
    - "project.v"
    - "spi_slave.v"

pinout:
  # Inputs
  ui[0]: "pre_spike"
  ui[1]: "post_spike"
  ui[2]: "timestamp_clk"
  ui[3]: "learn_enable"
  ui[4]: "reward"
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "update_ready"
  uo[1]: "potentiation"
  uo[2]: "depression"
  uo[3]: "weight_overflow"
  uo[4]: "weight_delta[0]"
  uo[5]: "weight_delta[1]"
  uo[6]: "weight_delta[2]"
  uo[7]: "weight_delta[3]"

  # Bidirectional pins
  uio[0]: "spi_cs_n"
  uio[1]: "spi_mosi"
  uio[2]: "spi_miso"
  uio[3]: "spi_sck"
  uio[4]: "debug_pre_valid"
  uio[5]: "debug_post_valid"
  uio[6]: "debug_fsm[0]"
  uio[7]: "debug_fsm[1]"

# Do not change!
yaml_version: 6
