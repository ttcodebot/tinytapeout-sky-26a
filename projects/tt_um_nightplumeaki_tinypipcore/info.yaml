# Tiny Tapeout project information
project:
  title:        "tinypipcore"              # Project title
  author:       "Yuxuan Liu"               # Your name
  discord:      "@nightplume_akiyama"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "8-bit 2-stage pipelined CPU with 4 registers and 13 instructions"      # One line description of what your project does
  language:     "SystemVerilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     50000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_nightplumeaki_tinypipcore"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.sv"
    - "nightplumeaki_top.sv"
    - "cpu_control.sv"
    - "regfile.sv"
    - "alu.sv"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "DATA_IN0"
  ui[1]: "DATA_IN1"
  ui[2]: "DATA_IN2"
  ui[3]: "DATA_IN3"
  ui[4]: "DATA_IN4"
  ui[5]: "DATA_IN5"
  ui[6]: "DATA_IN6"
  ui[7]: "DATA_IN7"

  # Outputs
  uo[0]: "ADDR0"
  uo[1]: "ADDR1"
  uo[2]: "ADDR2"
  uo[3]: "ADDR3"
  uo[4]: "ADDR4"
  uo[5]: "ADDR5"
  uo[6]: "ADDR6"
  uo[7]: "ADDR7"

  # Bidirectional pins
  uio[0]: "STORE_DATA0"
  uio[1]: "STORE_DATA1"
  uio[2]: "STORE_DATA2"
  uio[3]: "STORE_DATA3"
  uio[4]: "STORE_DATA4"
  uio[5]: "STORE_DATA5"
  uio[6]: "STORE_DATA6"
  uio[7]: "STORE_DATA7"

# Do not change!
yaml_version: 6
