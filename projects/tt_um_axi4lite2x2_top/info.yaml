project:
  title:        "AXI4-Lite 2M-2S Interconnect"
  author:       "Kavinesh"
  description:  "Dual Master Dual Slave AXI4-Lite Interconnect"
  language:     "Verilog"
  clock_hz:     50000000
  tiles: "1x1"
  top_module:  "tt_um_axi4lite2x2_top"

  source_files:
    - "tt_um_axi4lite2x2_top.v"
    - "axi4lite_master.v"
    - "axi4lite_slave.v"

pinout:
  # =========================
  # MASTER0 (ui)
  # =========================
  ui[0]: "m0_start_write"
  ui[1]: "m0_start_read"
  ui[2]: "m0_addr[0]"
  ui[3]: "m0_addr[1]"
  ui[4]: "m0_addr[2]"
  ui[5]: "m0_addr[3]"
  ui[6]: ""
  ui[7]: ""

  # =========================
  # MASTER0 OUTPUT (read data)
  # =========================
  uo[0]: "m0_rdata[0]"
  uo[1]: "m0_rdata[1]"
  uo[2]: "m0_rdata[2]"
  uo[3]: "m0_rdata[3]"
  uo[4]: "m0_rdata[4]"
  uo[5]: "m0_rdata[5]"
  uo[6]: "m0_rdata[6]"
  uo[7]: "m0_rdata[7]"

  # =========================
  # MASTER1 (uio)
  # =========================
  uio[0]: "m1_start_write"
  uio[1]: "m1_start_read"
  uio[2]: "m1_addr[0]"
  uio[3]: "m1_addr[1]"
  uio[4]: "m1_addr[2]"
  uio[5]: "m1_addr[3]"
  uio[6]: "m1_data[6]"
  uio[7]: "m1_data[7]"

yaml_version: 6
