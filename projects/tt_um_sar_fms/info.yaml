# Tiny Tapeout project information
project:
  title:        "SAR FSM"      # Project title
  author:       "Sönke Appel"      # Your name
  discord:      "sonkeappel_04726"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A parameterizable successive approximation (SAR) finite state machine (FSM) for an ADC"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     100000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_sar_fms"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "sarfsm.v"
    - "tt_um_FHW-Appel_SARFSM.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "Compareator output" 
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "sar_out[0] Conversion Result"
  uo[1]: "sar_out[1] Conversion Result"
  uo[2]: "sar_out[2] Conversion Result"
  uo[3]: "sar_out[3] Conversion Result"
  uo[4]: "debug ui[0] (loopback for testing)"
  uo[5]: ""
  uo[6]: ""
  uo[7]: "End of conversion flag (EOC)"

  # Bidirectional pins
  uio[0]: "sar_int[0] DAC input"
  uio[1]: "sar_int[1] DAC input"
  uio[2]: "sar_int[2] DAC input"
  uio[3]: "sar_int[3] DAC input"
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
