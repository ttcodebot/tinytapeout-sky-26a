# Tiny Tapeout project information
project:
  title:        "ttcpu 4-bit RISC microprocessor"      # Project title
  author:       "Ojas Sharma"      # Your name
  discord:      "railwaysaregreat"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A custom 4-bit RISC microprocessor design for the Tiny Tapeout ASIC"      # One line description of what your project does
  language:     "SystemVerilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     0       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_ojas_sharma_imperial_ttcpu"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_ojas_sharma_imperial_ttcpu.sv"
    - "ttcpu.sv"
    - "alu4.sv"
    - "cond.sv"
    - "controldecode.sv"
    - "controlpath.sv"
    - "datapath.sv"
    - "dpdecode.sv"
    - "extend.sv"
    - "regfile.sv"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "rom_data[0]"
  ui[1]: "rom_data[1]"
  ui[2]: "rom_data[2]"
  ui[3]: "rom_data[3]"
  ui[4]: "rom_data[4]"
  ui[5]: "rom_data[5]"
  ui[6]: "rom_data[6]"
  ui[7]: "rom_data[7]"

  # Outputs
  uo[0]: "rom_address[0]"
  uo[1]: "rom_address[1]"
  uo[2]: "rom_address[2]"
  uo[3]: "rom_address[3]"
  uo[4]: "rom_address[4]"
  uo[5]: "rom_address[5]"
  uo[6]: "ram_address[4]"
  uo[7]: "ram_wen"

  # Bidirectional pins
  uio[0]: "ram_data[0]"
  uio[1]: "ram_data[1]"
  uio[2]: "ram_data[2]"
  uio[3]: "ram_data[3]"
  uio[4]: "ram_address[0]"
  uio[5]: "ram_address[1]"
  uio[6]: "ram_address[2]"
  uio[7]: "ram_address[3]"

# Do not change!
yaml_version: 6
