# Tiny Tapeout project information
project:
  title:        "serdes8b10"      # Project title
  author:       "Paul Campbell"      # Your name
  discord:      "moonbaseotago"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Test for 8b10 serdes"      # One line description of what your project does
  language:     "SystemVerilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     20000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_8b10"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "des8b10.sv"
    - "lfsr8b10b.sv"
    - "ser8b10.sv"


# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "in0"
  ui[1]: "in1"
  ui[2]: "in2"
  ui[3]: "in3"
  ui[4]: "in4"
  ui[5]: "in5"
  ui[6]: "in6"
  ui[7]: "in7"

  # Outputs
  uo[0]: "out0"
  uo[1]: "out1"
  uo[2]: "out2"
  uo[3]: "out3"
  uo[4]: "out4"
  uo[5]: "out5"
  uo[6]: "out6"
  uo[7]: "out7"

  # Bidirectional pins
  uio[0]: "ink"
  uio[1]: "outk"
  uio[2]: "data"
  uio[3]: "rcv_ready"
  uio[4]: "xmt_ready"
  uio[5]: "rcvclk10"
  uio[6]: "xmtclk10"
  uio[7]: "outlocked"

# Do not change!
yaml_version: 6
