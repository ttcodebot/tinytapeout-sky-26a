  ui[0]: "inpout1"
  ui[1]: "Rx"
  ui[2]: "Mosi"
  ui[3]: SCL""
  ui[4]: SEG""
  ui[5]: "TX"
  ui[6]: "RX"
  ui[7]: "OutPUT"

  # Outputs
  uo[0]: "00"
  uo[1]: "01"
  uo[2]: "10"
  uo[3]: "11"
  uo[4]: "101"
  uo[5]: "110"
  uo[6]: "011"
