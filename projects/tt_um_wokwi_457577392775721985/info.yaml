# Tiny Tapeout project information (Wokwi project)
project:
  wokwi_id:     457577392775721985       # Set this to the ID of your Wokwi project (the number from the project's URL)
  title:        " tiny Tapeout Test Gate"      # Project title 
  author:       " Idris jibril"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Test some Logic gates and a clock divider"      # One line description of what your project does
  language:     "Wokwi" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:    10000        # Clock frequency in Hz (or 0 if not applicable)

