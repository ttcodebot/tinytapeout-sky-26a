# Tiny Tapeout project information
project:
  title:        "Interference Ripples"
  author:       "Kilian"
  discord:      ""
  description:  "Organic water-caustic interference patterns from orbiting wave sources — no CPU, no memory, pure logic"
  language:     "Verilog"
  clock_hz:     25175000       # Clock frequency in Hz (25.175 MHz for VGA)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_kilian_interference"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "palette[0]"
  ui[1]: "palette[1]"
  ui[2]: "ring_density[0]"
  ui[3]: "ring_density[1]"
  ui[4]: "speed"
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "R1"
  uo[1]: "G1"
  uo[2]: "B1"
  uo[3]: "VSYNC"
  uo[4]: "R0"
  uo[5]: "G0"
  uo[6]: "B0"
  uo[7]: "HSYNC"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
