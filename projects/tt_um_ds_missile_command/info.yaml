# Tiny Tapeout project information
project:
  title:        "Missile Command"     # Project title
  author:       "Diego Satizabal"     # Your name
  discord:      "DiegoSatizabal"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A tiny version of Atari's Missile Command game."      # One line description of what your project does
  language:     "Verilog"             # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     25000000              # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "2x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_ds_missile_command"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "crosshair.v"
    - "explossion.v"
    - "fortress.v"
    - "game_over_banner.v"
    - "gamepad_pmod_decoder.v"
    - "gamepad_pmod_driver.v"
    - "gamepad_pmod_single.v"
    - "hsync_generator.v"
    - "level_banner.v"
    - "missile_starter.v"
    - "missile.v"
    - "start_banner.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: ""
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: "gamepad"
  ui[5]: "gamepad"
  ui[6]: "gamepad"
  ui[7]: ""

  # Outputs
  uo[0]: "r7"
  uo[1]: "g7"
  uo[2]: "b7"
  uo[3]: "vsync"
  uo[4]: "r6"
  uo[5]: "g6"
  uo[6]: "b6"
  uo[7]: "hsync"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
